<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <style>
    .animate {
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
  </style>
  <circle class="animate" cx="100" cy="100" r="80" fill="lightblue" />
  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-size="30" fill="darkblue">AI Tools</text>
</svg>
